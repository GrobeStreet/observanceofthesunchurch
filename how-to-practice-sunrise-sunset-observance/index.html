<!doctype html><html><head><meta charset='utf-8'><title>How to Practice Sunrise and Sunset Observance</title><meta name='description' content='Learn how to practice silent sunrise and sunset observance.'><link rel='stylesheet' href='/style.css'></head><body><main class='wrap'><h1>How to practice sunrise and sunset observance.</h1><ol><li>Find the next sunrise or sunset.</li><li>Arrive quietly.</li><li>Put the phone away.</li><li>Observe in silence.</li><li>Return tomorrow.</li></ol><p>The discipline is attention.</p></main></body></html>
