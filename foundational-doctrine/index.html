<!doctype html><html><head><meta charset='utf-8'><title>Foundational Doctrine</title><meta name='description' content='Doctrine of Observance of the Sun.'><link rel='stylesheet' href='/style.css'></head><body><main class='wrap'><h1>Foundational doctrine.</h1><p>The doctrine protects the practice from becoming spectacle, hierarchy, or transaction.</p><ul><li>Sunrise and sunset observance is central.</li><li>No donor status.</li><li>No coercion.</li><li>Community remains voluntary.</li></ul></main></body></html>
